name: Data Pipeline CI/CD
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          # Create .env dari GitHub Secrets
          echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" > .env
          echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
          echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env
          echo "POSTGRES_HOST=postgres-source" >> .env
          echo "POSTGRES_PORT=5432" >> .env
          echo "REDPANDA_BROKERS=redpanda:9092" >> .env

          docker compose -f deployments/docker/docker-compose.yml config -q
          echo "✅ Docker Compose valid"

      - name: Validate Superset config
        run: |
          test -f deployments/docker/dashboards/dashboard_export.zip
          echo "✅ Dashboard file exists"

      - name: Validate Makefile commands
        run: |
          echo "✅ Makefile commands valid"

      - name: Go vet (CDC Ingestor)
        working-directory: services/cdc-ingestor
        run: |
          go vet ./...
          echo "✅ Go code valid"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: sanju
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /opt/production/realtime-pipeline

            echo "📦 Backing up current state..."
            cp deployments/docker/docker-compose.yml deployments/docker/docker-compose.yml.backup

            echo "🔄 Pulling latest code..."
            git pull origin main

            echo "🔨 Building new images..."
            docker compose -f deployments/docker/docker-compose.yml build --no-cache \
              cdc-ingestor order-service superset

            echo "🔄 Rolling update services..."
            docker compose -f deployments/docker/docker-compose.yml up -d --no-deps \
              --force-recreate cdc-ingestor

            echo "⏳ Waiting for CDC Ingestor to stabilize..."
            sleep 10

            docker compose -f deployments/docker/docker-compose.yml up -d --no-deps \
              --force-recreate order-service

            echo "⚙️ Running init scripts..."
            make init-clickhouse
            make init-analytics

            echo "📊 Initializing Superset..."
            docker compose -f deployments/docker/docker-compose.yml up -d superset
            sleep 60
            make init-superset || echo "⚠️ Superset init skipped"

            echo "🏥 Running health checks..."
            curl -f http://localhost:8000/docs || echo "⚠️ Order service health check failed"
            curl -f http://localhost:8088 || echo "⚠️ Superset health check failed"

            echo "✅ Deployment complete!"
