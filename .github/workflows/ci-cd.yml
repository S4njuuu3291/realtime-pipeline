name: Data Pipeline CI/CD
on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          echo "POSTGRES_USER=dummy" > .env
          echo "POSTGRES_PASSWORD=dummy" >> .env
          echo "POSTGRES_DB=dummy" >> .env
          echo "POSTGRES_HOST=dummy" >> .env
          echo "POSTGRES_PORT=5432" >> .env
          echo "REDPANDA_BROKERS=dummy:9092" >> .env
          docker compose -f deployments/docker/docker-compose.yml config -q
          echo "Docker Compose valid"

      - name: Validate Superset config
        run: |
          test -f deployments/docker/dashboards/dashboard_export.zip
          echo "Dashboard file exists"

      - name: Validate Makefile commands
        run: |
          echo "Makefile commands valid"

      - name: Go vet (CDC Ingestor)
        working-directory: services/cdc-ingestor
        run: |
          go vet ./...
          echo "Go code valid"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Contabo VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: sanju
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/production/realtime-pipeline

            # ── 1. AMANKAN .env ──────────────────────────────────────────────
            echo "Backing up .env to temp..."
            cp -f .env /tmp/realtime-pipeline.env.bak 2>/dev/null || true

            echo "Cleaning pycache..."
            find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

            echo "Fetch and reset to latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Restoring .env from temp..."
            cp -f /tmp/realtime-pipeline.env.bak .env 2>/dev/null || true

            echo "Verifying Grafana provisioning files..."
            test -f services/grafana/provisioning/datasources/datasource.yml && echo "  ✅ datasource.yml" || echo "  ⚠️ datasource.yml missing"
            test -f services/grafana/provisioning/dashboards/dashboards.yml && echo "  ✅ dashboards.yml" || echo "  ⚠️ dashboards.yml missing"
            ls services/grafana/dashboards/*.json 2>/dev/null && echo "  ✅ dashboard JSON files found" || echo "  ⚠️ No dashboard JSON files found"

            # ── 2. DETEKSI FIRST DEPLOY vs UPDATE ──────────────────────────
            if docker compose --env-file .env -f deployments/docker/docker-compose.yml ps --services --filter "status=running" 2>/dev/null | grep -q .; then
              echo "  ✅ Existing deployment — performing NON-DESTRUCTIVE update"
              IS_FIRST_DEPLOY=false
            else
              echo "  🆕 First deployment — performing FULL initial setup"
              IS_FIRST_DEPLOY=true
            fi

            # ── 3. BUILD ────────────────────────────────────────────────────
            echo "Building images..."
            docker compose --env-file .env -f deployments/docker/docker-compose.yml build --no-cache cdc-ingestor order-service traffic-generator

            echo "Unsetting system env vars that override .env file..."
            unset POSTGRES_USER POSTGRES_PASSWORD POSTGRES_DB POSTGRES_HOST POSTGRES_PORT

            # ── 4A. FIRST DEPLOY PATH ──────────────────────────────────────
            if [ "$IS_FIRST_DEPLOY" = true ]; then
              echo "🎬 Running full-start..."
              make full-start
              echo ""
              echo "✅ FIRST DEPLOY COMPLETE"
              exit 0
            fi

            # ── 4B. NON-DESTRUCTIVE UPDATE PATH ─────────────────────────────
            echo "Tearing down containers (volumes preserved)..."
            docker compose --env-file .env -f deployments/docker/docker-compose.yml down
            sleep 3

            echo "Starting all services..."
            docker compose --env-file .env -f deployments/docker/docker-compose.yml up -d --wait 2>&1 || true
            sleep 10

            echo "Checking container status..."
            docker ps --format "table {{.Names}}\t{{.Status}}"

            echo "Restarting CDC Ingestor (reuses existing slot)..."
            docker compose --env-file .env -f deployments/docker/docker-compose.yml restart cdc-ingestor
            sleep 5

            echo "Initializing Superset..."
            sleep 30
            make init-superset 2>/dev/null || echo "Superset init skipped"

            # ── 5. HEALTH CHECKS ────────────────────────────────────────────
            echo ""
            echo "Health checks..."
            curl -sf http://localhost:8000/docs > /dev/null && echo "  ✅ Order service" || echo "  ⚠️ Order service"
            curl -sf http://localhost:8088 > /dev/null && echo "  ✅ Superset" || echo "  ⚠️ Superset"
            curl -sf http://localhost:9090/-/healthy > /dev/null && echo "  ✅ Prometheus" || echo "  ⚠️ Prometheus"
            curl -sf http://localhost:3000/api/health > /dev/null && echo "  ✅ Grafana" || echo "  ⚠️ Grafana"
            curl -sf http://localhost:9100/metrics > /dev/null && echo "  ✅ Node Exporter" || echo "  ⚠️ Node Exporter"
            docker ps --filter "name=cdc-ingestor" --format "{{.Names}}\t{{.Status}}" | grep -q "Up" && echo "  ✅ CDC Ingestor" || echo "  ⚠️ CDC Ingestor"

            echo ""
            echo "✅ NON-DESTRUCTIVE DEPLOYMENT COMPLETE!"
